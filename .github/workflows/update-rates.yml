name: Update FX Rates
on:
  schedule:
    - cron: '0 2 * * 1-5'  # 週一至週五 UTC 02:00 自動跑
  workflow_dispatch:       # 可以手動觸發
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance
      - name: Run fetch script
        run: python scripts/fetch_rates.py
      - name: Commit updated rates.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git diff --staged --quiet || git commit -m "Auto-update FX rates $(date +'%Y-%m-%d')"
          git push
